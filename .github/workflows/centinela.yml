name: SATICA Nube & Sincronización Automática

on:
  schedule:
    # Corre cada 30 minutos en horas críticas
    # Hora Colombia (UTC-5): 6:00 AM a 10:00 PM (Equivalente en UTC: 11:00 UTC a 03:00 UTC)
    - cron: '*/30 11-23,0-3 * * *'
  push:
    branches:
      - master
  workflow_dispatch: # Permite ejecutarlo a mano desde el botón "Run workflow" en GitHub

jobs:
  motor-y-despliegues:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      NASA_FIRMS_KEY:     ${{ secrets.NASA_FIRMS_KEY }}
      HF_TOKEN:           ${{ secrets.HF_TOKEN }}
      # URL del portal en GitHub Pages
      SHINY_URL_BASE:     'https://satica-cvc-satica.hf.space/'

    steps:
      - name: 📥 Clonar Repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para hacer push a Hugging Face

      - name: 🔧 Instalar dependencias del sistema (GIS completo)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            pandoc
          echo "✅ Dependencias del sistema instaladas correctamente."

      - name: 🔵 Configurar R 4.4
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true # Usa binarios de RSPM (ultra-rápido)

      - name: 📦 Cache de paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-44-satica-v2.1
          restore-keys: ${{ runner.os }}-r-44-satica-

      - name: 📦 Instalar paquetes R (desde binarios RSPM)
        run: |
          Rscript -e '
            options(repos = c(
              RSPM = "https://packagemanager.posit.co/cran/__linux__/jammy/latest",
              CRAN = "https://cloud.r-project.org"
            ))
            pkgs <- c("sf", "dplyr", "httr", "stringr", "readr", "janitor", "jsonlite", "openxlsx", "rmarkdown", "ggplot2", "visNetwork", "shinyWidgets", "shiny", "kableExtra", "pagedown")
            to_install <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
            if (length(to_install)) {
              message("Instalando: ", paste(to_install, collapse=", "))
              install.packages(to_install, Ncpus = 2)
            }
            message("✅ Paquetes listos.")
          '

      - name: 🛰️ [1/2] Correr Centinela Satelital (Alertas Telegram)
        run: |
          # El centinela se ejecuta para escanear fuegos y notificar al instante a Telegram
          Rscript centinela_satelital.R

      - name: 🤖 [2/2] Ejecutar Motor SATICA Completo (XGBoost V9 + Consolidación)
        run: |
          # Corre el motor central para recalcular semáforos, predicciones de IA y summary JSON
          Rscript satica_engine.R

      - name: 📊 Compilar Reporte Rmd a HTML Estático
        run: |
          # Solo compilar el boletín los días 15, 30, 31, o si es disparo manual / push (no programado)
          DIA_MES=$(date +%d)
          EVENTO="${{ github.event_name }}"
          if [ "$EVENTO" = "schedule" ] && [ "$DIA_MES" != "15" ] && [ "$DIA_MES" != "30" ] && [ "$DIA_MES" != "31" ]; then
            echo "⏭️ Hoy es día $DIA_MES y el trigger es programado ($EVENTO). Saltando generación de Boletín Oficial (solo se genera quincenalmente los 15 y 30)."
          else
            echo "🚀 Iniciando compilación de Boletín Oficial (Día: $DIA_MES, Trigger: $EVENTO)..."
            # Renderizar el R Markdown a la carpeta www/ para el portal
            Rscript -e 'rmarkdown::render("reporte.Rmd", output_file = "www/reporte.html")'
            # Compilar el Reporte a PDF mediante pagedown
            Rscript -e 'pagedown::chrome_print("www/reporte.html", output = "data_master/Boletin_SATICA_latest.pdf")'
          fi

      - name: 📂 Estructurar archivos para GitHub Pages
        run: |
          # Copiamos bases consolidadas y plantillas generadas a la carpeta pública del portal
          mkdir -p www/data_master
          mkdir -p www/resultados_diagnostico
          
          # Copiamos archivos con nombres genéricos fijos de descarga
          cp -f data_master/SATICA_MASTER_v2.2.rds www/data_master/
          cp -f data_master/SATICA_HISTORIAL_v2.2.rds www/data_master/
          cp -f data_master/data_summary.json www/data_master/
          cp -f data_master/GOES16_Alertas.csv www/data_master/
          
          # Copiamos la caché geoespacial estática para que la app interactiva la cargue desde la nube
          mkdir -p www/data_estatica
          cp -f data_estatica/GEO_CACHE_SATICA.rds www/data_estatica/
          cp -f data_estatica/REST_CACHE_SATICA.RData www/data_estatica/
          
          # Copiamos KML, XLSX, CSV y PDF generados por el motor si existen
          [ -f "data_master/SATICA_Seguimiento_latest.xlsx" ] && cp -f data_master/SATICA_Seguimiento_latest.xlsx www/data_master/ || echo "No XLSX"
          [ -f "data_master/Plantilla_Visitas_SATICA_latest.csv" ] && cp -f data_master/Plantilla_Visitas_SATICA_latest.csv www/data_master/ || echo "No CSV"
          [ -f "data_master/SATICA_GIS_latest.kml" ] && cp -f data_master/SATICA_GIS_latest.kml www/data_master/ || echo "No KML"
          [ -f "data_master/Boletin_SATICA_latest.pdf" ] && cp -f data_master/Boletin_SATICA_latest.pdf www/data_master/ || echo "No PDF"
          [ -f "resultados_diagnostico/punto_ciego_suroriente.csv" ] && cp -f resultados_diagnostico/punto_ciego_suroriente.csv www/resultados_diagnostico/ || echo "No punto ciego"
          [ -f "sin_georref_coords.csv" ] && cp -f sin_georref_coords.csv www/ || echo "No manual coords"
          [ -f "visitas_cvc.csv" ] && cp -f visitas_cvc.csv www/ || echo "No visitas"
          

      - name: 🚀 Desplegar Portal Estático a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: www # Carpeta que contiene la landing index.html y los datos estructurados
          branch: gh-pages # Rama de hosting estático público de GitHub
          clean: false # Evitar sobreescribir configuraciones previas

      - name: 📤 Sincronizar Aplicación con Hugging Face Spaces
        if: env.HF_TOKEN != ''
        run: |
          # Crear directorio temporal para el deploy limpio
          mkdir -p ../hf-deploy-dir
          
          # Copiar archivos individuales de la aplicación Shiny
          cp ui.R ../hf-deploy-dir/
          cp server.R ../hf-deploy-dir/
          cp global.R ../hf-deploy-dir/
          cp instalar_dependencias.R ../hf-deploy-dir/
          cp aux_functions.R ../hf-deploy-dir/
          cp Dockerfile ../hf-deploy-dir/
          cp README.md ../hf-deploy-dir/
          
          # Copiar únicamente el logo de la corporación para la interfaz
          mkdir -p ../hf-deploy-dir/www
          [ -f "www/cvc_logo.png" ] && cp www/cvc_logo.png ../hf-deploy-dir/www/ || echo "No logo"
          
          # Copiar bases de datos y cachés geoespaciales para acelerar el inicio
          mkdir -p ../hf-deploy-dir/data_master
          [ -f "data_master/SATICA_MASTER_v2.2.rds" ] && cp data_master/SATICA_MASTER_v2.2.rds ../hf-deploy-dir/data_master/
          [ -f "data_master/SATICA_HISTORIAL_v2.2.rds" ] && cp data_master/SATICA_HISTORIAL_v2.2.rds ../hf-deploy-dir/data_master/
          
          mkdir -p ../hf-deploy-dir/data_estatica
          [ -f "data_estatica/GEO_CACHE_SATICA.rds" ] && cp data_estatica/GEO_CACHE_SATICA.rds ../hf-deploy-dir/data_estatica/
          [ -f "data_estatica/REST_CACHE_SATICA.RData" ] && cp data_estatica/REST_CACHE_SATICA.RData ../hf-deploy-dir/data_estatica/
          
          mkdir -p ../hf-deploy-dir/resultados_diagnostico
          [ -f "resultados_diagnostico/punto_ciego_suroriente.csv" ] && cp resultados_diagnostico/punto_ciego_suroriente.csv ../hf-deploy-dir/resultados_diagnostico/
          
          [ -f "sin_georref_coords.csv" ] && cp sin_georref_coords.csv ../hf-deploy-dir/
          
          # Ir al directorio temporal
          cd ../hf-deploy-dir
          
          # Inicializar un nuevo repositorio git limpio desde cero (sin historial)
          git init
          git config --global user.email "satica-bot@cvc.gov.co"
          git config --global user.name "SATICA Cloud Bot"
          git config --global --add safe.directory $(pwd)
          
          # Agregar archivos y hacer un único commit plano
          git add .
          git commit -m "deploy: clean flat deployment for Hugging Face Spaces"
          
          # Agregar remoto y empujar forzado a la rama main
          git remote add hf https://satica-cvc:$HF_TOKEN@huggingface.co/spaces/satica-cvc/satica
          git push hf master:main --force || git push hf HEAD:main --force
          
          # Volver a la carpeta de trabajo y borrar la temporal
          cd -
          rm -rf ../hf-deploy-dir
