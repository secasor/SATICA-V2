name: SATICA Centinela Satelital (NASA FIRMS)

on:
  schedule:
    # Corre cada 15 minutos en horas críticas
    # Hora Colombia (UTC-5): 6:00 AM a 10:00 PM
    # Equivalente en UTC: 11:00 UTC a 03:00 UTC+1 (siguiente día)
    - cron: '*/15 11-23,0-3 * * *'
  workflow_dispatch: # Permite ejecutarlo a mano con el botón "Run workflow"

jobs:
  vigilancia:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      NASA_FIRMS_KEY:     ${{ secrets.NASA_FIRMS_KEY }}
      SHINY_URL_BASE:     'https://cvcsuroriente.shinyapps.io/satica/'

    steps:
      - name: 📥 Clonar Repositorio
        uses: actions/checkout@v4

      - name: 🔧 Instalar dependencias del sistema (GIS)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev \
            libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: 🔵 Configurar R 4.4
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: 📦 Cache de paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-firms-${{ hashFiles('R/api_goes16.R') }}
          restore-keys: ${{ runner.os }}-r-firms-

      - name: 📦 Instalar paquetes R necesarios
        run: |
          Rscript -e '
            pkgs <- c("sf", "dplyr", "httr", "stringr", "readr", "janitor")
            to_install <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
            if (length(to_install)) {
              install.packages(to_install,
                repos = "https://cloud.r-project.org",
                Ncpus = 2)
            }
            message("Paquetes verificados: ", paste(pkgs, collapse=", "))
          '

      - name: 🛰️ Ejecutar Centinela Satelital SATICA
        run: Rscript centinela_satelital.R
